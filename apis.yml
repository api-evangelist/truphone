aid: truphone
url: https://raw.githubusercontent.com/api-evangelist/truphone/refs/heads/main/apis.yml
name: Truphone (1GLOBAL)
kind: company
description: Truphone is a global eSIM, IoT, and enterprise connectivity provider now
  operating as 1GLOBAL after its 2022 acquisition. It runs its own global mobile
  network supplemented by roaming across 600+ partner networks in 190+ countries, and
  exposes REST APIs for SIM/eSIM lifecycle management, data usage and connectivity,
  rate plans, and IoT device management across its 1GLOBAL IoT Portal, 1GLOBAL Connect,
  and the 1GLOBAL platform API.
