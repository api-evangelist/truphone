    type: Documentation
  - url: https://docs.things.1global.com/apireference/
    type: APIReference
  - url: openapi/truphone-openapi.yml
    type: OpenAPI
  description: List, retrieve, update, and change the status of SIM cards and eSIMs
    (TEST, PROVISIONED, PRE-ACTIVE, ACTIVE, SUSPENDED, RETIRED) and activate or suspend
